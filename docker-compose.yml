services:
  neo4j:
    image: neo4j:5-community
    container_name: envelope-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/envelope_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./graph_lineage/neo4j_client/apoc.conf:/var/lib/neo4j/conf/apoc.conf
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  neo4j-init:
    image: python:3.12-slim
    container_name: envelope-neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./graph_lineage/neo4j_client:/scripts:ro
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: envelope_dev
    command: >
      sh -c "pip install --no-cache-dir neo4j==5.24.0 &&
             python /scripts/init_db.py"
  # ─── SERVER API (SULLA 8502) ───
  api:
    build:
      context: . 
      dockerfile: graph_lineage/server/Dockerfile 
    container_name: envelope-api
    restart: unless-stopped
    ports:
      - "8502:8502" 
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: envelope_dev
    depends_on:
      neo4j:
        condition: service_started
    # healthcheck disabled for Community Edition
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8502/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 10s
  
  streamlit:
    build:
      context: .
      dockerfile: graph_lineage/streamlit_ui/Dockerfile
    container_name: envelope-ui
    restart: unless-stopped
    ports:
      - "8501:8501" 
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: envelope_dev
    depends_on:
      neo4j:
        condition: service_started

volumes:
  neo4j_data:
  neo4j_logs: