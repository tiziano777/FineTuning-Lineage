model:
  lineage_uri: .lineage/experiment.yml

output:
  output_dir: /path/to/merged/output
  model_name: "my-merged-llm"

model_merging:

  base_model:
    id: "my-merged-llm"
    uri: "/path/to/base/model" 

  method: "linear"           # linear (ex avg) | slerp | task_arithmetic | ties | dare
  lora_enabled: false        # Se true, fonde gli adapter nell'URI di model.uri
  
  # Raggruppiamo i parametri puramente hardware/computazionali
  compute:
    torch_dtype: "bfloat16"  # Precisione di calcolo (caricamento in memoria)
    save_dtype: "bfloat16"   # Precisione di esportazione sul disco
  
  # N sorgenti (modelli o adapter) tracciate con la stessa logica delle recipe entries
  sources:
    - uri: "/path/to/model_or_adapter_1"
      weight: 0.5            # Opzionale: peso del modello nel merge (es. slerp/linear)
    - uri: "/path/to/model_or_adapter_2"
      weight: 0.5

hardware:
  gpu:
    type: "NVIDIA A100 80GB PCIe"
    count: 1
