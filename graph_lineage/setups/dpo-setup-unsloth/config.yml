  description: "[EXTENDED] \nRicetta creata come primo test del  framework PDO su small\
    \ LLM.\nBilanciamneto lingue 50% IT, 50% EN.\nComposizione:\n- Orca it long context,\
    \ contiene negativi estratti dal modello target.\n- Dolci DPO en con domini QA e\
    \ RAG, negativi NON del modello target ma d modelli di taglia simile!"
