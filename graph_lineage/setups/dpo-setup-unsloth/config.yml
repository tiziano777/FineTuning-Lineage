
model:
  lineage_uri: .lineage/experiment.yml
  model_uri: /nfs/training-output/velvet-cycle2/Velvet-2B-1.5/l06_f5/001_s_09_5/ba53454
  model_id: velvet-2b-1.5_ba53454_t0

  dataset:
    cache_dir: /nfs/training-output/.dpo-cache/${experiment.name}/data
    filtered_samples: /home/velvet/dpo-setup/modules/utils/long-context${experiment.name}.jsonl
    templates_mapping: modules/templates/chat_type_mapping.yml

    prompt_strategy: random  # random, round_robin, all (cartesian product)
    rejected_temperature: 0.7 # temperature for sampling negatives during dataset preparation

    hard_negative_enabled: true # Enable false only for MATH e CODE domanins, false for QA e RAG
    hard_negative_params:
      config_based_fallback: temperature
      w1: 0.2
      w2: 0.2
      w3: 0.4
      w4: 0.2
      use_length_penalty: true
      # hardcoded calibration for M-curve length scoring system
      outlier_std: 1.2
      suspected_std: 3.0
      gamma: 0.2
      # Phase 1.b structural rescue thresholds (language-dependent, tune per corpus)
      rescue_compression_ratio_min: 0.32
      rescue_ngram_rep_rate_max: 0.57

    shuffle_strategy: random   # random | circular
    shuffle_seed: 42
    shuffle_block_size: 1000   # righe per blocco

  training:
    max_seq_length: 4096  # Unsloth model loading context window
    learning_rate: 1e-05
    lr_scheduler_type: linear
    optim: paged_adamw_8bit
    beta: 0.1
    weight_decay: 0.0
    warmup_steps: 1000
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    num_train_epochs: 3
    gradient_checkpointing: true
    use_cache: false
    ref_model: null 
    precompute_ref_log_probs: false

    logging_steps: 10
    eval_steps: 50
    evaluation_strategy: steps
    save_steps: 500
    max_steps: null
    
    bf16: true
    torch_dtype: bfloat16
    # device_map: auto
    remove_unused_columns: false
    # Single Device (4096-1024) | Multi Device (8192-1536)
    max_length: 4096         # Include: system + user_prompt + response (chosen O rejected)
    max_prompt_length: 1024  # Lunghezza MASSIMA del system_prompt + user_prompt
    
    eval_size: 0.05

    callback:
      generation:
        num_samples: 3
        log_steps_interval: 500
        max_new_tokens: 512

    deepspeed:
      fp16:
        enabled: false
      bf16:
        enabled: true
      gradient_accumulation_steps: auto
      gradient_clipping: auto
      train_batch_size: auto
      train_micro_batch_size_per_gpu: auto
      zero_optimization:
        stage: 2
        offload_optimizer:
          device: cpu
          pin_memory: true
        activation_checkpointing:
            partition_activations: true
            cpu_checkpointing: true
            contiguous_memory_optimization: true
            synchronize_checkpoint_boundary: true 
      
  peft:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    bias: none
    task_type: CAUSAL_LM
    init_lora_weights: true
    inference_mode: false
    use_dora: false
    # choose between ['q_proj','v_proj','k_proj','o_proj','gate_proj','up_proj','down_proj']
    target_modules: ['q_proj','v_proj','k_proj','o_proj','gate_proj','up_proj','down_proj']
    peft_trainable_ratio: 0.4

  reward:
    type: verifiable
    functions:
      - name: accuracy_reward_example
        module_path: modules.rewards.accuracy_example

