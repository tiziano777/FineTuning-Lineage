# SkyPilot Task Template — Managed by base_schedule.sh
name: __TASK_NAME__

resources:
  accelerators: __SKY_ACCELERATORS__
  cpus: __SKY_CPUS__
  memory: __SKY_MEMORY__
  disk_size: 200

# Sincronizza l'intero progetto
workdir: __REPO_ROOT__

envs:
  # Path relativo della config dentro la cartella del run generata
  RELATIVE_CONFIG_PATH: "__RELATIVE_CONFIG_PATH__"

setup: |
  echo "=== SETUP DI RUNTIME ==="
  mkdir -p /tmp/skypilot_configs
  # Copia la configurazione unita nello spazio /tmp isolato prima del training
  cp "${RELATIVE_CONFIG_PATH}" /tmp/skypilot_configs/runtime_config.yml
  
  # Attivazione ed eventuale check del venv locale esistente
  if [ -f ".venv/bin/activate" ]; then
    echo "Ambiente .venv rilevato."
  else
    echo "ATTENZIONE: .venv non trovato in workdir!"
  fi

run: |
  echo "=== AVVIO TRAINING DPO ==="
  source .venv/bin/activate
  echo "Using Python from: $(which python)"
  
  # Avvio del training passando la configurazione blindata in /tmp
  python train.py --config /tmp/skypilot_configs/runtime_config.yml