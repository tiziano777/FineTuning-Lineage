      Assistant: HTTPS secures web communication by combining HTTP with TLS (Transport\
      \ Layer Security). When a browser connects to an HTTPS server, a TLS handshake\
      \ occurs: the server presents its SSL certificate, the browser verifies it against\
      \ a list of trusted Certificate Authorities, and they negotiate a symmetric\
      \ encryption key using asymmetric cryptography \u2014 typically RSA or ECDHE.\
      \ All subsequent data is encrypted with AES-256, ensuring confidentiality and\
      \ integrity. HTTPS also provides authentication, confirming the server is who\
      \ it claims to be. The protocol operates on port 443 by default.\n\n---\nUser:\
      \ What is the difference between RAM and ROM?\nAssistant: RAM (Random Access\
      \ Memory) is volatile memory used for temporary data storage during active computation.\
      \ It loses all content when power is removed. Modern systems use DDR5 RAM, which\
      \ operates at speeds up to 6400 MT/s. ROM (Read-Only Memory) is non-volatile\
      \ and retains data without power. It is used to store firmware and bootloaders\
      \ \u2014 code that must persist across reboots. ROM is written once during manufacturing\
      \ and cannot be modified by normal software operations. The two serve fundamentally\
      \ different purposes: RAM is the workspace, ROM is the permanent instruction\
      \ set.\n\n---\nAnswer the user's question using the same authoritative, technical\
      \ style."
